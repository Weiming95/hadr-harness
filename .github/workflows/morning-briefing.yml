name: HADR morning briefing

# Runs the harness once a day: assess the feeds, message a briefing to Telegram,
# and publish the dashboard to GitHub Pages.
on:
  schedule:
    # TEMPORARY: every 20 min to confirm GitHub's scheduler fires at all.
    # Revert to the daily 08:30 SGT slot (`30 0 * * *`) once verified.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

# Pages deploy needs pages:write + id-token:write; contents:read is enough else.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run the harness (one shot)
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_MODEL: kimi-k2.7-code
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Stable Pages URL — send_telegram appends it to the briefing. The page
          # is (re)published by the deploy step below moments later.
          DASHBOARD_URL: https://weiming95.github.io/hadr-harness/
        run: |
          python3 harness.py --once \
            "Fetch USGS and GDACS, assess the current worldwide disaster picture, and call write_dashboard to save a morning situation report of the most serious events. Call send_telegram with a concise plain-text briefing. Then, before you finish, decide on a civilian broadcast: if ANY event is a Red or Orange alert affecting a populated area (a cyclone, earthquake, flood, tsunami or similar near towns or cities), you MUST call draft_broadcast with short, actionable civilian alerts (at least a radio script and an SMS) for that area; only skip draft_broadcast if no event meets that bar, and if you skip it say so and why. Finally summarise in one paragraph."

      - name: Assemble the Pages site
        run: |
          mkdir -p site
          if [ -f dashboard.html ]; then
            cp dashboard.html site/index.html
          else
            echo "<!doctype html><meta charset=utf-8><title>HADR</title><h1>No briefing produced this run.</h1>" > site/index.html
          fi
          # Publish civilian broadcast drafts too, when this run produced any.
          if [ -f broadcast.html ]; then
            cp broadcast.html site/broadcast.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
